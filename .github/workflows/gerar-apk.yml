name: Gerar APK Automático (Capacitor)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Preparar Estrutura de Build Web
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp script.js www/ 2>/dev/null || true
          cp style.css www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          cp service-worker.js www/ 2>/dev/null || true
          cp logo.png www/ 2>/dev/null || true

      - name: Instalar Dependências do Projeto
        run: npm install

      - name: Inicializar Projeto Android com Capacitor
        run: |
          npx cap add android
          npx cap sync

      - name: Compilar o APK Nativo do Android
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Salvar o APK gerado como resultado
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
