name: Gerar APK Automático

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configurar o Java (Necessário para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar o Cordova
        run: npm install -g cordova

      - name: Criar Projeto Android
        run: |
          # 1. Cria a pasta temporária do app
          cordova create meu-app com.soaresexpress.app "Soares Express"
          
          # 2. Limpa o conteúdo padrão da pasta www do Cordova para evitar lixo
          rm -rf meu-app/www/*
          
          # 3. Copia apenas os arquivos do front-end da raiz para a pasta www de forma limpa
          cp index.html meu-app/www/ 2>/dev/null || true
          cp script.js meu-app/www/ 2>/dev/null || true
          cp style.css meu-app/www/ 2>/dev/null || true
          cp manifest.json meu-app/www/ 2>/dev/null || true
          cp service-worker.js meu-app/www/ 2>/dev/null || true
          
          # 4. Copia os arquivos de configuração estruturais do app
          cp config.xml meu-app/config.xml 2>/dev/null || true
          cp logo.png meu-app/logo.png 2>/dev/null || true
          
          # 5. Entra na pasta do app para gerenciar os componentes nativos
          cd meu-app
          
          # 6. ADICIONA OS PLUGINS OBRIGATÓRIOS PARA FAZER O PDF FUNCIONAR NO CELULAR
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-file-opener2
          
          # 7. Adiciona a plataforma Android
          cordova platform add android
          
      - name: Compilar o APK de Teste (Debug)
        run: |
          cd meu-app
          cordova build android --debug

      - name: Salvar o APK gerado como resultado
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-apk
          path: meu-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
